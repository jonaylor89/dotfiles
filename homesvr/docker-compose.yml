version: "3.9"

services:
  uptime:
    image: louislam/uptime-kuma:latest
    restart: always
    volumes:
      - /srv/data/uptime:/app/data
    ports:
      - "3001:3001"

  homarr:
    image: ghcr.io/ajnart/homarr:latest
    restart: always
    volumes:
      - /srv/data/homarr:/app/data/configs
    ports:
      - "7575:7575"

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard-residential
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SERVERURL=your.dyndns.com # change me
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0,::/0
    volumes:
      - /srv/data/wireguard:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

  transmission:
    image: ghcr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - USER=username
      - PASS=password # change me
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      - /srv/data/transmission/config:/config
      - /srv/data/transmission/downloads:/downloads
      - /srv/data/transmission/watch:/watch
    networks:
      - media

  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "9696:9696"
    volumes:
      - /srv/data/prowlarr:/config
    networks:
      - media

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "8989:8989"
    volumes:
      - /srv/data/sonarr:/config
      - /srv/data/transmission/downloads:/data
    networks:
      - media

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "7878:7878"
    volumes:
      - /srv/data/radarr:/config
      - /srv/data/transmission/downloads:/data
    networks:
      - media

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - TZ=America/New_York
      - JELLYFIN_PublishedServerUrl=http://localhost # change me
    ports:
      - "8096:8096"
      - "8920:8920"
      - "7359:7359/udp"
      - "1900:1900/udp"
    volumes:
      - /srv/data/jellyfin/config:/config
      - /srv/data/jellyfin/cache:/cache
      - /srv/media/tv:/data/tv
      - /srv/media/movies:/data/movies
      - /srv/media/music:/data/music
    networks:
      - media

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__DOMAIN=localhost # change to ip
      - GITEA__server__ROOT_URL=localhost # change to ip
    volumes:
      - /srv/data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:22"

  postgres:
    image: postgres:16
    restart: always
    volumes:
      - /srv/data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: newsletter

  redis:
    image: redis:7
    restart: always
    volumes:
      - /srv/data/redis:/data

  hub:
    image: jonaylor/hub:latest
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      APP_APPLICATION__HMAC_SECRET: ${APP_HMAC_SECRET}
      APP_APPLICATION__API_BEARER_TOKEN: ${APP_API_BEARER_TOKEN}
      APP_APPLICATION__BASE_URL: ${APP_BASE_URL}
      APP_DATABASE__HOST: postgres
      APP_DATABASE__PORT: "5432"
      APP_DATABASE__USERNAME: ${POSTGRES_USER}
      APP_DATABASE__PASSWORD: ${POSTGRES_PASSWORD}
      APP_DATABASE__DATABASE_NAME: newsletter
      APP_DATABASE__REQUIRE_SSL: "false"
      APP_EMAIL_CLIENT__AUTHORIZATION_TOKEN: ${POSTMARK_TOKEN}
      APP_REDIS_URI: "redis://redis:6379"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

networks:
  media:
    driver: bridge
